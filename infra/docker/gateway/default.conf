# Route support console by Host. Use regex to avoid edge-cases with *.localhost matching.
map $host $fitboddy_frontend {
    ~*^support\.(localhost|fitboddy\.ru)$  fitboddy-support;
    default                                fitboddy-admin;
}

server {
    listen 8080 default_server;
    server_name _;
    client_max_body_size 200m;

    include /etc/nginx/api_locations.inc;

    location / {
        # Docker embedded DNS (required when proxy_pass uses a variable)
        resolver 127.0.0.11 valid=10s ipv6=off;
        proxy_pass http://$fitboddy_frontend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        # Keep original host for the browser/HMR; Vite allows *.localhost and configured hosts.
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Debug which upstream was chosen (harmless in local/dev)
        add_header X-Fitboddy-Frontend $fitboddy_frontend always;
    }
}

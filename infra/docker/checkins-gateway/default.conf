server {
    listen 8080;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location ^~ /api/v1/ {
        proxy_pass http://checkins-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://checkins-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

services:
  auth-service:
    volumes:
      - ../fitboddy-auth-service:/app
    command: >-
      poetry run uvicorn --app-dir /app/lib presentation.http.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/lib
    environment:
      WATCHFILES_FORCE_POLLING: "true"

  tenant-service:
    volumes:
      - ../fitboddy-tenant-service:/app
    command: >-
      poetry run uvicorn --app-dir /app/lib presentation.http.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/lib
    environment:
      WATCHFILES_FORCE_POLLING: "true"

  profile-service:
    volumes:
      - ../fitboddy-profile-service:/app
    command: >-
      poetry run uvicorn --app-dir /app/lib presentation.http.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/lib
    environment:
      WATCHFILES_FORCE_POLLING: "true"

  plan-service:
    volumes:
      - ../fitboddy-plan-service:/app
    command: >-
      poetry run uvicorn --app-dir /app/lib presentation.http.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/lib
    environment:
      WATCHFILES_FORCE_POLLING: "true"

  fitboddy-admin:
    build:
      context: ../fitboddy-admin-frontend
      dockerfile: Dockerfile.dev
    image: fitboddy-admin-dev:local
    working_dir: /app
    command: >-
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 8080 --strictPort"
    environment:
      VITE_PLATFORM_API_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../fitboddy-admin-frontend:/app
      - fitboddy_admin_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  fitboddy_admin_node_modules:

services:
  fitboddy-admin:
    build: null
    image: node:22-alpine
    working_dir: /app
    command: >-
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 8080 --strictPort"
    environment:
      VITE_PLATFORM_API_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../fitboddy-admin-frontend:/app
      - fitboddy_admin_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  fitboddy_admin_node_modules:

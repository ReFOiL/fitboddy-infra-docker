name: fitboddy-checkins

services:
  checkins-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${CHECKINS_POSTGRES_USER:-fitboddy_checkins}
      POSTGRES_PASSWORD: ${CHECKINS_POSTGRES_PASSWORD:-fitboddy_checkins_local_dev}
      POSTGRES_DB: ${CHECKINS_POSTGRES_DB:-fitboddy_checkins}
    volumes:
      - checkins_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHECKINS_POSTGRES_USER:-fitboddy_checkins} -d ${CHECKINS_POSTGRES_DB:-fitboddy_checkins}"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  checkins-service:
    build:
      context: ../fitboddy-checkins-service
    environment:
      DATABASE_URL: postgresql+psycopg://${CHECKINS_POSTGRES_USER:-fitboddy_checkins}:${CHECKINS_POSTGRES_PASSWORD:-fitboddy_checkins_local_dev}@checkins-postgres:5432/${CHECKINS_POSTGRES_DB:-fitboddy_checkins}
      JWT_SECRET: ${CHECKINS_JWT_SECRET:-checkins_dev_secret_change_me}
      JWT_ALGORITHM: ${CHECKINS_JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_TTL_MINUTES: ${CHECKINS_ACCESS_TOKEN_TTL_MINUTES:-10080}
      CORS_ALLOW_ORIGINS: ${CHECKINS_CORS_ALLOW_ORIGINS:-http://localhost:8090,http://127.0.0.1:8090}
    depends_on:
      checkins-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  checkins-frontend:
    build:
      context: ../fitboddy-checkins-frontend
    depends_on:
      checkins-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  checkins-gateway:
    image: nginx:1.27-alpine
    depends_on:
      checkins-frontend:
        condition: service_started
      checkins-service:
        condition: service_started
    ports:
      - "8090:8080"
    volumes:
      - ./infra/docker/checkins-gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  checkins_postgres_data:
